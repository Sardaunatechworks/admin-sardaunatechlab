<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Sardauna Tech Lab</title>
    <!-- Tailwind CSS (CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0A2A54',
                            gold: '#FDB813',
                            'gold-dark': '#E5A510'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Login Screen overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
            <div class="flex items-center justify-center mb-6 text-brand-navy">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-display font-bold text-center text-brand-navy mb-2">Admin Login</h2>
            <p class="text-sm text-center text-slate-500 mb-6">Enter password to manage content</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <input type="password" id="admin-password" placeholder="Password" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:border-brand-gold focus:ring-1 focus:ring-brand-gold transition-colors" required>
                </div>
                <button type="submit" class="w-full bg-brand-navy text-white font-semibold py-3 rounded-lg hover:bg-brand-navy/90 transition-colors">Login</button>
            </form>
            <p id="login-error" class="text-red-500 text-sm text-center mt-4 hidden">Incorrect Password.</p>
        </div>
    </div>

    <!-- Main Dashboard (hidden until login) -->
    <div id="admin-dashboard" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between z-10">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-brand-navy rounded flex justify-center items-center text-brand-gold">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-display font-bold text-brand-navy">Content Manager</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="save-status" class="text-sm text-green-600 font-medium hidden flex items-center gap-1"><i data-lucide="check-circle" class="w-4 h-4"></i> Saved</span>
                <button id="save-btn" class="bg-brand-gold text-brand-navy px-5 py-2 rounded-lg font-semibold hover:bg-brand-gold-dark transition-colors flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> Save All Changes
                </button>
                <button id="logout-btn" class="text-slate-500 hover:text-brand-navy transition-colors px-3">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main Content Layout -->
        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar Navigation -->
            <aside class="w-64 bg-white border-r border-slate-200 overflow-y-auto">
                <nav class="p-4 space-y-2">
                    <button class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg bg-brand-navy/5 text-brand-navy font-semibold transition-colors" data-target="services">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Services
                    </button>
                    <button class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-slate-50 transition-colors" data-target="products">
                        <i data-lucide="box" class="w-5 h-5"></i> Products
                    </button>
                    <button class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-slate-50 transition-colors" data-target="team">
                        <i data-lucide="users" class="w-5 h-5"></i> Team Members
                    </button>
                    <button class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-slate-50 transition-colors" data-target="blogs">
                        <i data-lucide="file-text" class="w-5 h-5"></i> Blogs
                    </button>
                    <button class="tab-btn w-full flex items-center gap-3 px-4 py-3 text-left rounded-lg text-slate-600 hover:bg-slate-50 transition-colors" data-target="partners">
                        <i data-lucide="handshake" class="w-5 h-5"></i> Partners
                    </button>
                </nav>
            </aside>

            <!-- Content Area -->
            <main class="flex-1 overflow-y-auto p-8 relative">
                
                <!-- Services Tab -->
                <div id="tab-services" class="tab-content">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-brand-navy">Services</h2>
                        <button class="btn-add flex items-center gap-2 text-brand-navy bg-white border border-slate-200 px-4 py-2 rounded-lg hover:border-brand-gold transition-colors font-semibold" data-type="services">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Service
                        </button>
                    </div>
                    <div id="list-services" class="grid lg:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                </div>

                <!-- Products Tab -->
                <div id="tab-products" class="tab-content hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-brand-navy">Products</h2>
                        <button class="btn-add flex items-center gap-2 text-brand-navy bg-white border border-slate-200 px-4 py-2 rounded-lg hover:border-brand-gold transition-colors font-semibold" data-type="products">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Product
                        </button>
                    </div>
                    <div id="list-products" class="grid lg:grid-cols-2 gap-6"></div>
                </div>

                <!-- Team Tab -->
                <div id="tab-team" class="tab-content hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-brand-navy">Team Members</h2>
                        <button class="btn-add flex items-center gap-2 text-brand-navy bg-white border border-slate-200 px-4 py-2 rounded-lg hover:border-brand-gold transition-colors font-semibold" data-type="team">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Member
                        </button>
                    </div>
                    <div id="list-team" class="grid lg:grid-cols-2 xl:grid-cols-4 gap-6"></div>
                </div>

                <!-- Blogs Tab -->
                <div id="tab-blogs" class="tab-content hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-brand-navy">Blogs</h2>
                        <button class="btn-add flex items-center gap-2 text-brand-navy bg-white border border-slate-200 px-4 py-2 rounded-lg hover:border-brand-gold transition-colors font-semibold" data-type="blogs">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Blog
                        </button>
                    </div>
                    <div id="list-blogs" class="grid lg:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                </div>

                <!-- Partners Tab -->
                <div id="tab-partners" class="tab-content hidden">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-brand-navy">Partners & Collaborators</h2>
                        <button class="btn-add flex items-center gap-2 text-brand-navy bg-white border border-slate-200 px-4 py-2 rounded-lg hover:border-brand-gold transition-colors font-semibold" data-type="partners">
                            <i data-lucide="plus" class="w-4 h-4"></i> Add Partner
                        </button>
                    </div>
                    <div id="list-partners" class="grid lg:grid-cols-2 xl:grid-cols-4 gap-6"></div>
                </div>
                
            </main>
        </div>
    </div>

    <!-- Modal for Editing/Adding -->
    <div id="edit-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                <h3 id="modal-title" class="text-lg font-bold text-brand-navy">Edit Item</h3>
                <button id="modal-close" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="modal-body" class="p-6 overflow-y-auto flex-1 space-y-4">
                <!-- Form fields injected here by JS -->
            </div>
            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button id="modal-cancel" class="px-5 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-200 transition-colors">Cancel</button>
                <button id="modal-save" class="px-5 py-2 rounded-lg font-semibold bg-brand-navy text-white hover:bg-brand-navy/90 transition-colors">Apply Changes</button>
            </div>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
